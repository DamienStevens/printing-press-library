version: 2
project_name: home-health-pp-cli
changelog:
  disable: true
builds:
  - id: home-health-pp-cli
    main: ./cmd/home-health-pp-cli
    binary: home-health-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/monitoring/home-health/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: home-health-pp-mcp
    main: ./cmd/home-health-pp-mcp
    binary: home-health-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: home-health-pp-cli
    repository:
      owner: dstevens
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Whole-home air-health dashboard aggregating AirThings, IQAir/AirVisual and MOCREO sensors into one local history, focused on mold and allergy monitoring."
    install: |
      bin.install "home-health-pp-cli"
      bin.install "home-health-pp-mcp"
