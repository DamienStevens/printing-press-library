version: 2
project_name: fpi-india-pp-cli
changelog:
  disable: true
builds:
  - id: fpi-india-pp-cli
    main: ./cmd/fpi-india-pp-cli
    binary: fpi-india-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/fpi-india/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: fpi-india-pp-mcp
    main: ./cmd/fpi-india-pp-mcp
    binary: fpi-india-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: fpi-india-pp-cli
    repository:
      owner: lavs9
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The full history of Foreign Portfolio Investor flows into India, synced locally and queryable offline — something neither NSDL nor CDSL offers today."
    install: |
      bin.install "fpi-india-pp-cli"
      bin.install "fpi-india-pp-mcp"
