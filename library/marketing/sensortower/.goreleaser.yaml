version: 2
project_name: sensortower-pp-cli
changelog:
  disable: true
builds:
  - id: sensortower-pp-cli
    main: ./cmd/sensortower-pp-cli
    binary: sensortower-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/marketing/sensortower/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: sensortower-pp-mcp
    main: ./cmd/sensortower-pp-mcp
    binary: sensortower-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: sensortower-pp-cli
    repository:
      owner: waveriderai
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every free Sensor Tower ranking, plus the rank history the dashboard forgets the moment you close the tab."
    install: |
      bin.install "sensortower-pp-cli"
      bin.install "sensortower-pp-mcp"
