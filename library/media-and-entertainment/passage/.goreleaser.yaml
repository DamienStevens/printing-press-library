version: 2
project_name: passage-pp-cli
changelog:
  disable: true
builds:
  - id: passage-pp-cli
    main: ./cmd/passage-pp-cli
    binary: passage-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/passage/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: passage-pp-mcp
    main: ./cmd/passage-pp-mcp
    binary: passage-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: passage-pp-cli
    repository:
      owner: justinwfu
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "A contemplative daily reading practice — open book APIs as your library, real public-domain passages to sit with, and a reading journal that's yours."
    install: |
      bin.install "passage-pp-cli"
      bin.install "passage-pp-mcp"
