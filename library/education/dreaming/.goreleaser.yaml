version: 2
project_name: dreaming-pp-cli
changelog:
  disable: true
builds:
  - id: dreaming-pp-cli
    main: ./cmd/dreaming-pp-cli
    binary: dreaming-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/education/dreaming/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: dreaming-pp-mcp
    main: ./cmd/dreaming-pp-mcp
    binary: dreaming-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: dreaming-pp-cli
    repository:
      owner: paulbockewitz
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Dreaming Spanish and French tracking feature in one offline-first CLI - roadmap math, catalog search"
    install: |
      bin.install "dreaming-pp-cli"
      bin.install "dreaming-pp-mcp"
