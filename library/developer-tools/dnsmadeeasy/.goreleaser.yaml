version: 2
project_name: dnsmadeeasy-pp-cli
changelog:
  disable: true
builds:
  - id: dnsmadeeasy-pp-cli
    main: ./cmd/dnsmadeeasy-pp-cli
    binary: dnsmadeeasy-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/dnsmadeeasy/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: dnsmadeeasy-pp-mcp
    main: ./cmd/dnsmadeeasy-pp-mcp
    binary: dnsmadeeasy-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: dnsmadeeasy-pp-cli
    repository:
      owner: dericknwq
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every DNS Made Easy operation, plus a local record store that makes cross-zone search, drift detection, and 'where is this IP used' instant and offline."
    install: |
      bin.install "dnsmadeeasy-pp-cli"
      bin.install "dnsmadeeasy-pp-mcp"
