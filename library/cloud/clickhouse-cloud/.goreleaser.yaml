version: 2
project_name: clickhouse-cloud-pp-cli
changelog:
  disable: true
builds:
  - id: clickhouse-cloud-pp-cli
    main: ./cmd/clickhouse-cloud-pp-cli
    binary: clickhouse-cloud-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/cloud/clickhouse-cloud/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: clickhouse-cloud-pp-mcp
    main: ./cmd/clickhouse-cloud-pp-mcp
    binary: clickhouse-cloud-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: clickhouse-cloud-pp-cli
    repository:
      owner: sdhilip200
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Printing Press CLI for Clickhouse Cloud."
    install: |
      bin.install "clickhouse-cloud-pp-cli"
      bin.install "clickhouse-cloud-pp-mcp"
